<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
  <defs>
    <!-- Skin gradient -->
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#C4956A"/>
    </linearGradient>
    <!-- Kumma (cap) pattern gradient -->
    <linearGradient id="kummaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="40%" stop-color="#EDE6D6"/>
      <stop offset="100%" stop-color="#E8DFC8"/>
    </linearGradient>
    <!-- Dishdasha gradient -->
    <linearGradient id="dishdashaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0EDE6"/>
    </linearGradient>
    <!-- Shadow -->
    <radialGradient id="shadowGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(0,0,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- Subtle face shadow -->
    <linearGradient id="faceShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.06)"/>
    </linearGradient>
  </defs>

  <!-- === BODY GROUP (for wave/idle animation via CSS) === -->
  <g id="avatar-body">
    <!-- Ground shadow -->
    <ellipse cx="100" cy="312" rx="55" ry="8" fill="url(#shadowGrad)"/>

    <!-- === DISHDASHA (traditional white robe) === -->
    <g id="avatar-dishdasha">
      <!-- Main body -->
      <path d="M68 165 C65 180 58 240 55 295 Q55 310 100 310 Q145 310 145 295 C142 240 135 180 132 165 Z" fill="url(#dishdashaGrad)" stroke="#E0D8C8" stroke-width="0.5"/>
      <!-- Collar / neckline detail -->
      <path d="M82 162 Q100 175 118 162" fill="none" stroke="#DDD5C5" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Center seam line -->
      <line x1="100" y1="172" x2="100" y2="300" stroke="#E8E0D0" stroke-width="0.6" stroke-dasharray="4,6"/>
      <!-- Tassel (furakha) at neckline -->
      <line x1="100" y1="168" x2="100" y2="188" stroke="#C8B898" stroke-width="1" stroke-linecap="round"/>
      <circle cx="100" cy="189" r="2" fill="#C8B898"/>
    </g>

    <!-- === LEFT ARM === -->
    <g id="avatar-arm-left">
      <path d="M68 170 C55 185 42 210 38 235 Q36 242 40 244 Q44 246 46 240 C50 218 58 198 68 182" fill="url(#dishdashaGrad)" stroke="#E0D8C8" stroke-width="0.5"/>
      <!-- Left hand -->
      <ellipse cx="39" cy="242" rx="8" ry="10" fill="url(#skinGrad)" transform="rotate(-10,39,242)"/>
      <!-- Fingers -->
      <path d="M33 236 Q30 232 32 230" fill="none" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M35 234 Q33 229 35 227" fill="none" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- === RIGHT ARM (will animate for wave) === -->
    <g id="avatar-arm-right" transform-origin="132 170">
      <path d="M132 170 C145 185 158 210 162 235 Q164 242 160 244 Q156 246 154 240 C150 218 142 198 132 182" fill="url(#dishdashaGrad)" stroke="#E0D8C8" stroke-width="0.5"/>
      <!-- Right hand -->
      <ellipse cx="161" cy="242" rx="8" ry="10" fill="url(#skinGrad)" transform="rotate(10,161,242)"/>
      <!-- Fingers -->
      <path d="M167 236 Q170 232 168 230" fill="none" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M165 234 Q167 229 165 227" fill="none" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- === HEAD GROUP === -->
  <g id="avatar-head">
    <!-- Neck -->
    <rect x="90" y="148" width="20" height="22" rx="4" fill="url(#skinGrad)"/>

    <!-- === FACE === -->
    <g id="avatar-face">
      <!-- Head shape -->
      <ellipse cx="100" cy="108" rx="48" ry="55" fill="url(#skinGrad)"/>
      <!-- Face shadow overlay -->
      <ellipse cx="100" cy="108" rx="48" ry="55" fill="url(#faceShadow)"/>

      <!-- Ears -->
      <ellipse cx="53" cy="110" rx="7" ry="10" fill="#C4956A"/>
      <ellipse cx="53" cy="110" rx="4" ry="7" fill="#B8876A"/>
      <ellipse cx="147" cy="110" rx="7" ry="10" fill="#C4956A"/>
      <ellipse cx="147" cy="110" rx="4" ry="7" fill="#B8876A"/>

      <!-- Hair hint (dark, peeking from under kumma) -->
      <path d="M60 82 Q65 75 80 72 Q100 68 120 72 Q135 75 140 82" fill="none" stroke="#2C1810" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

      <!-- === EYEBROWS === -->
      <path d="M74 92 Q82 86 92 90" fill="none" stroke="#3D2B1F" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M108 90 Q118 86 126 92" fill="none" stroke="#3D2B1F" stroke-width="2.5" stroke-linecap="round"/>

      <!-- === EYES === -->
      <g id="avatar-eyes">
        <!-- Left eye white -->
        <ellipse cx="83" cy="100" rx="10" ry="8" fill="white"/>
        <!-- Left iris -->
        <circle cx="84" cy="100" r="5" fill="#3D2B1F"/>
        <!-- Left pupil -->
        <circle cx="85" cy="99" r="2.5" fill="#1A0F09"/>
        <!-- Left eye shine -->
        <circle cx="86" cy="97" r="1.8" fill="white" opacity="0.9"/>
        <!-- Left eye bottom lid -->
        <path d="M73 102 Q83 110 93 102" fill="none" stroke="#C4956A" stroke-width="0.8"/>

        <!-- Right eye white -->
        <ellipse cx="117" cy="100" rx="10" ry="8" fill="white"/>
        <!-- Right iris -->
        <circle cx="116" cy="100" r="5" fill="#3D2B1F"/>
        <!-- Right pupil -->
        <circle cx="115" cy="99" r="2.5" fill="#1A0F09"/>
        <!-- Right eye shine -->
        <circle cx="114" cy="97" r="1.8" fill="white" opacity="0.9"/>
        <!-- Right eye bottom lid -->
        <path d="M107 102 Q117 110 127 102" fill="none" stroke="#C4956A" stroke-width="0.8"/>
      </g>

      <!-- Eyelashes (subtle) -->
      <path d="M73 96 L71 94" stroke="#3D2B1F" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
      <path d="M93 96 L95 94" stroke="#3D2B1F" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
      <path d="M107 96 L105 94" stroke="#3D2B1F" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
      <path d="M127 96 L129 94" stroke="#3D2B1F" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

      <!-- === NOSE === -->
      <path d="M97 106 Q100 118 103 106" fill="none" stroke="#B8876A" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Nostrils -->
      <circle cx="96" cy="112" r="1.2" fill="#B8876A" opacity="0.5"/>
      <circle cx="104" cy="112" r="1.2" fill="#B8876A" opacity="0.5"/>

      <!-- === MOUTH (friendly smile) === -->
      <g id="avatar-mouth">
        <path d="M88 124 Q100 136 112 124" fill="none" stroke="#8B5E3C" stroke-width="2" stroke-linecap="round"/>
        <!-- Upper lip detail -->
        <path d="M92 124 Q96 122 100 123 Q104 122 108 124" fill="none" stroke="#A07050" stroke-width="0.8" stroke-linecap="round"/>
      </g>

      <!-- Subtle cheek blush -->
      <ellipse cx="72" cy="116" rx="8" ry="5" fill="#E8A090" opacity="0.25"/>
      <ellipse cx="128" cy="116" rx="8" ry="5" fill="#E8A090" opacity="0.25"/>

      <!-- Light mustache hint -->
      <path d="M90 120 Q100 118 110 120" fill="none" stroke="#5C3D2E" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
    </g>

    <!-- === KUMMA (Traditional Omani cap) === -->
    <g id="avatar-kumma">
      <!-- Main kumma shape -->
      <ellipse cx="100" cy="68" rx="44" ry="15" fill="#E8DFC8"/>
      <path d="M56 68 Q56 30 100 25 Q144 30 144 68" fill="url(#kummaGrad)"/>
      <!-- Kumma embroidery pattern (tarzah) — geometric -->
      <path d="M65 50 L75 42 L85 50 L95 42 L105 50 L115 42 L125 50 L135 42" fill="none" stroke="#C8B898" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      <path d="M68 58 L78 50 L88 58 L98 50 L108 58 L118 50 L128 58" fill="none" stroke="#C8B898" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
      <!-- Top detail -->
      <circle cx="100" cy="30" r="3" fill="none" stroke="#D0C8B0" stroke-width="0.8"/>
      <circle cx="100" cy="30" r="1.5" fill="#D0C8B0" opacity="0.5"/>
      <!-- Kumma edge band -->
      <ellipse cx="100" cy="68" rx="44" ry="15" fill="none" stroke="#C8B898" stroke-width="1.5"/>
      <ellipse cx="100" cy="70" rx="42" ry="13" fill="none" stroke="#DDD5C5" stroke-width="0.5"/>
    </g>
  </g>

  <!-- === BLINK ANIMATION OVERLAY === -->
  <g id="avatar-blink" opacity="0">
    <ellipse cx="83" cy="100" rx="10" ry="8" fill="url(#skinGrad)"/>
    <path d="M73 100 Q83 104 93 100" fill="none" stroke="#3D2B1F" stroke-width="1.5" stroke-linecap="round"/>
    <ellipse cx="117" cy="100" rx="10" ry="8" fill="url(#skinGrad)"/>
    <path d="M107 100 Q117 104 127 100" fill="none" stroke="#3D2B1F" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- CSS Animations embedded -->
  <style>
    /* Idle floating */
    #avatar-body, #avatar-head {
      animation: avatarIdle 3s ease-in-out infinite;
    }
    @keyframes avatarIdle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Blink every few seconds */
    #avatar-blink {
      animation: blink 4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 92%, 100% { opacity: 0; }
      95%, 97% { opacity: 1; }
    }

    /* Subtle head tilt */
    #avatar-head {
      animation: avatarIdle 3s ease-in-out infinite, headTilt 6s ease-in-out infinite;
    }
    @keyframes headTilt {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-6px) rotate(-2deg); }
      75% { transform: translateY(-3px) rotate(2deg); }
    }

    /* Wave animation class — applied via JS */
    .avatar-waving #avatar-arm-right {
      animation: waveArm 0.8s ease-in-out 3;
      transform-origin: 132px 170px;
    }
    @keyframes waveArm {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-35deg) translateX(5px); }
      50% { transform: rotate(-25deg) translateX(3px); }
      75% { transform: rotate(-35deg) translateX(5px); }
    }

    /* Pointing animation */
    .avatar-pointing #avatar-arm-right {
      animation: pointArm 0.6s ease-out forwards;
      transform-origin: 132px 170px;
    }
    @keyframes pointArm {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-50deg) translateX(10px) translateY(-10px); }
    }

    /* Celebrate animation */
    .avatar-celebrating #avatar-arm-right {
      animation: celebrateRight 0.5s ease-in-out 4;
      transform-origin: 132px 170px;
    }
    .avatar-celebrating #avatar-arm-left {
      animation: celebrateLeft 0.5s ease-in-out 4;
      transform-origin: 68px 170px;
    }
    @keyframes celebrateRight {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-45deg) translateY(-10px); }
    }
    @keyframes celebrateLeft {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(45deg) translateY(-10px); }
    }

    /* Talking mouth animation */
    .avatar-talking #avatar-mouth path:first-child {
      animation: talkMouth 0.3s ease-in-out 6;
    }
    @keyframes talkMouth {
      0%, 100% { d: path("M88 124 Q100 136 112 124"); }
      50% { d: path("M88 124 Q100 140 112 124"); }
    }

    @media (prefers-reduced-motion: reduce) {
      #avatar-body, #avatar-head, #avatar-blink,
      .avatar-waving #avatar-arm-right,
      .avatar-pointing #avatar-arm-right,
      .avatar-celebrating #avatar-arm-right,
      .avatar-celebrating #avatar-arm-left {
        animation: none !important;
      }
    }
  </style>
</svg>
